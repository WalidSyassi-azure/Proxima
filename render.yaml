services:
  - type: web
    name: proxima
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_ENV
        value: production
      - key: DATABASE_PATH
        value: /var/data/proxima.db
    disk:
      name: proxima-data
      mountPath: /var/data
      sizeGB: 1
